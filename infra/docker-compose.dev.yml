# Dev-infratuzilma: PostgreSQL(Timescale+PostGIS+pgvector) + Redis + MinIO
# Ishga tushirish: docker compose -f docker-compose.dev.yml up -d
name: employee-control-dev

services:
  db:
    # -ha image ichida: timescaledb, postgis, pgvector — reja §3 stack'i bitta image'da
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: employee_control
    ports:
      # host 5433 — 5432'ni boshqa lokal loyiha band qilgan bo'lishi mumkin
      - "5433:5432"
    volumes:
      - db_data:/home/postgres/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d employee_control"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  db_data:
  redis_data:
  minio_data:
