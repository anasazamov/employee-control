# Prod/test deploy — IZOLYATSIYALANGAN (band VPS: boshqa loyihalar buzilmasin).
# Public portlar: API 8090, MinIO 9010/9011. DB/Redis faqat ichki tarmoqda.
# Ishga tushirish: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
name: employee-control

services:
  db:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: employee_control
    volumes:
      - ec_db:/home/postgres/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d employee_control"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    # port PUBLISH QILINMAYDI — faqat ichki tarmoq (izolyatsiya)

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ec_redis:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9010:9000"   # presigned PUT/GET — telefon shu manzilga yuklaydi
      - "9011:9001"   # console
    volumes:
      - ec_minio:/data
    restart: unless-stopped

  migrate:
    build: ../backend
    command: ["alembic", "upgrade", "head"]
    environment:
      EC_MIGRATIONS_DATABASE_URL: postgresql+psycopg://postgres:${DB_PASSWORD}@db:5432/employee_control
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../backend
      args:
        # Haqiqiy yuz-tanish (insightface) shu servisga o'rnatiladi
        INSTALL_FACE: ${INSTALL_FACE:-false}
    # RAM-himoya: insightface og'ir; limit hostni (boshqa loyihalarni) OOM'dan saqlaydi —
    # limit oshsa faqat api restart bo'ladi. FACE_BACKEND=stub bo'lsa kamroq kerak.
    mem_limit: ${API_MEM_LIMIT:-2g}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]
    environment:
      # staging/test serverda DEBUG=true (OTP dev-kodi qaytadi, SMS'siz test uchun);
      # prod'da .env'da DEBUG qo'yilmaydi → false
      EC_DEBUG: ${DEBUG:-false}
      # Web admin brauzeri uchun CORS (vergul bilan ajratilgan origin ro'yxati).
      # Web dev-server localhost:5173 + deploy qilingan admin domeni/porti.
      EC_CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      EC_DATABASE_URL: postgresql+asyncpg://app_user:app_password@db:5432/employee_control
      EC_MIGRATIONS_DATABASE_URL: postgresql+psycopg://postgres:${DB_PASSWORD}@db:5432/employee_control
      EC_REDIS_URL: redis://redis:6379/0
      EC_JWT_SECRET: ${JWT_SECRET}
      EC_PLATFORM_API_KEY: ${PLATFORM_API_KEY}
      EC_MINIO_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      EC_MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      EC_MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      EC_FACE_BACKEND: ${FACE_BACKEND}
      EC_FACE_MODEL_PACK: ${FACE_MODEL_PACK}
    ports:
      - "8090:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  ec_db:
  ec_redis:
  ec_minio:
