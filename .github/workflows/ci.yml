name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint + izolyatsiya-testlar)
    runs-on: ubuntu-latest
    services:
      db:
        # Timescale+PostGIS+pgvector bitta image'da — dev-compose bilan bir xil
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: employee_control
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d employee_control"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      EC_DATABASE_URL: postgresql+asyncpg://app_user:app_password@localhost:5432/employee_control
      EC_MIGRATIONS_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/employee_control
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Migratsiya (RLS + hypertable)
        run: alembic upgrade head
      - name: Testlar (tenant-izolyatsiya CI-majburiy — reja §19)
        run: pytest tests -v

  web:
    name: Web (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Build (tsc + vite)
        run: npm run build

